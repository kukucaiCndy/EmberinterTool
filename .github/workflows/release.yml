name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════
  # macOS 构建 (arm64)
  # ═══════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt@6 spdlog fmt rapidjson
          brew link --force qt@6

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)/lib/cmake"

      - name: Build
        run: cd build && make -j$(sysctl -n hw.ncpu)

      - name: Deploy Qt
        run: |
          APP="build/bin/serial-monitor.app"
          rm -rf "$APP/Contents/Frameworks" \
                 "$APP/Contents/PlugIns" \
                 "$APP/Contents/Resources/qt.conf"
          "$(brew --prefix qt@6)/bin/macdeployqt" "$APP" \
            -qmldir="$GITHUB_WORKSPACE/src/gui/qml" \
            -libpath="$(brew --prefix qt@6)/lib"
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          DMG_DIR="build/dmg"
          mkdir -p "$DMG_DIR"
          cp -R build/bin/serial-monitor.app "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "EmberInterDebugTool" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "build/EmberInterDebugTool-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-dmg
          path: build/EmberInterDebugTool-macOS.dmg

  # ═══════════════════════════════════════════════
  # Windows 构建 (x64, MSYS2 MinGW64)
  # ═══════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-declarative
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-fmt
            mingw-w64-ucrt-x86_64-rapidjson

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cd build && mingw32-make -j$(nproc)

      - name: Deploy Qt
        run: |
          mkdir -p build/deploy
          cp build/bin/serial-monitor.exe build/deploy/
          cp build/bin/serial-monitor-cli.exe build/deploy/
          # 找到 windeployqt 的路径
          WINDEPLOYQT=$(which windeployqt-qt6.exe 2>/dev/null || which windeployqt6.exe 2>/dev/null || find /ucrt64 -name "windeployqt*" -type f 2>/dev/null | head -1)
          echo "Using windeployqt: $WINDEPLOYQT"
          "$WINDEPLOYQT" build/deploy/serial-monitor.exe \
            --qmldir src/gui/qml \
            --release \
            --no-translations \
            --no-system-d3d-compiler \
            --no-opengl-sw || true
          cp /ucrt64/bin/libstdc++-6.dll build/deploy/ 2>/dev/null || true
          cp /ucrt64/bin/libgcc_s_seh-1.dll build/deploy/ 2>/dev/null || true
          cp /ucrt64/bin/libwinpthread-1.dll build/deploy/ 2>/dev/null || true

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build/deploy/* -DestinationPath build/EmberInterDebugTool-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-zip
          path: build/EmberInterDebugTool-Windows.zip

  # ═══════════════════════════════════════════════
  # Linux 构建 (x64)
  # ═══════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libegl-dev \
            libspdlog-dev \
            libfmt-dev \
            rapidjson-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libwayland-egl-backend-dev \
            wayland-protocols \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-serialport-dev \
            qt6-svg-dev \
            libqt6opengl6-dev \
            libqt6serialport6-dev \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qml6-module-qtquick-window \
            qml6-module-qtquick-templates

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cd build && make -j$(nproc)

      - name: Create archive
        run: |
          mkdir -p build/deploy/bin
          cp build/bin/serial-monitor build/deploy/bin/
          cp build/bin/serial-monitor-cli build/deploy/bin/
          # 收集 Qt 依赖库
          ldd build/bin/serial-monitor | grep "=> /" | awk '{print $3}' | \
            xargs -I{} cp -v {} build/deploy/bin/ 2>/dev/null || true
          # 复制 Qt 插件
          mkdir -p build/deploy/bin/platforms
          mkdir -p build/deploy/bin/imageformats
          cp /usr/lib/x86_64-linux-gnu/qt6/plugins/platforms/libqxcb.so build/deploy/bin/platforms/ 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/qt6/plugins/imageformats/*.so build/deploy/bin/imageformats/ 2>/dev/null || true
          cd build
          zip -r EmberInterDebugTool-Linux.zip deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-zip
          path: build/EmberInterDebugTool-Linux.zip

  # ═══════════════════════════════════════════════
  # 发布 Release
  # ═══════════════════════════════════════════════
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macOS-dmg/EmberInterDebugTool-macOS.dmg
            artifacts/Windows-zip/EmberInterDebugTool-Windows.zip
            artifacts/Linux-zip/EmberInterDebugTool-Linux.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-test') || contains(github.ref, '-rc') }}
