name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════
  # macOS 构建 (arm64)
  # ═══════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt@6 spdlog fmt rapidjson create-dmg
          brew link --force qt@6

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)/lib/cmake"

      - name: Build
        run: cd build && make -j$(sysctl -n hw.ncpu)

      - name: Deploy Qt
        run: |
          APP="build/bin/serial-monitor.app"
          # 清理旧部署产物
          rm -rf "$APP/Contents/Frameworks" \
                 "$APP/Contents/PlugIns" \
                 "$APP/Contents/Resources/qt.conf"
          # macdeployqt 打包
          "$(brew --prefix qt@6)/bin/macdeployqt" "$APP" \
            -qmldir="$GITHUB_WORKSPACE/src/gui/qml" \
            -libpath="$(brew --prefix qt@6)/lib"
          # ad-hoc 签名
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          DMG_DIR="build/dmg"
          mkdir -p "$DMG_DIR"
          cp -R build/bin/serial-monitor.app "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "EmberInterDebugTool" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "build/EmberInterDebugTool-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-dmg
          path: build/EmberInterDebugTool-macOS.dmg

  # ═══════════════════════════════════════════════
  # Windows 构建 (x64, MSYS2 MinGW64)
  # ═══════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-quick
            mingw-w64-x86_64-qt6-quickcontrols2
            mingw-w64-x86_64-qt6-serialport
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-fmt
            mingw-w64-x86_64-rapidjson

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/mingw64/lib/cmake"

      - name: Build
        run: cd build && mingw32-make -j$(nproc)

      - name: Deploy Qt
        run: |
          mkdir -p build/deploy
          cp build/bin/serial-monitor.exe build/deploy/
          cp build/bin/serial-monitor-cli.exe build/deploy/
          # 使用 windeployqt 打包
          /mingw64/bin/windeployqt-qt6.exe build/deploy/serial-monitor.exe \
            --qmldir src/gui/qml \
            --release
          # 复制额外的 dll
          cp /mingw64/bin/libstdc++-6.dll build/deploy/ || true
          cp /mingw64/bin/libgcc_s_seh-1.dll build/deploy/ || true
          cp /mingw64/bin/libwinpthread-1.dll build/deploy/ || true

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build/deploy/* -DestinationPath build/EmberInterDebugTool-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-zip
          path: build/EmberInterDebugTool-Windows.zip

  # ═══════════════════════════════════════════════
  # Linux 构建 (x64, AppImage)
  # ═══════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libegl-dev \
            libspdlog-dev \
            libfmt-dev \
            rapidjson-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libwayland-egl-backend-dev \
            wayland-protocols
          # Qt6 via official PPA
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-quickcontrols2-dev \
            qt6-serialport-dev \
            qt6-svg-dev \
            libqt6opengl6-dev \
            libqt6serialport6-dev

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cd build && make -j$(nproc)

      - name: Deploy Qt
        run: |
          mkdir -p build/deploy/bin
          cp build/bin/serial-monitor build/deploy/bin/
          cp build/bin/serial-monitor-cli build/deploy/bin/
          # 使用 linuxdeployqt 或手动打包
          # 创建 AppDir 结构
          mkdir -p build/AppDir/usr/bin
          mkdir -p build/AppDir/usr/share/applications
          mkdir -p build/AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/bin/serial-monitor build/AppDir/usr/bin/
          cp build/bin/serial-monitor-cli build/AppDir/usr/bin/
          cp resources/icons/logo.png build/AppDir/usr/share/icons/hicolor/256x256/apps/serial-monitor.png
          cat > build/AppDir/usr/share/applications/serial-monitor.desktop <<EOF
          [Desktop Entry]
          Name=EmberInterDebugTool
          Exec=serial-monitor
          Icon=serial-monitor
          Type=Application
          Categories=Development;
          EOF
          # 收集 Qt 依赖库
          ldd build/bin/serial-monitor | grep "=> /" | awk '{print $3}' | \
            xargs -I{} cp -v {} build/deploy/bin/ 2>/dev/null || true
          # 复制 Qt 插件
          mkdir -p build/deploy/bin/platforms
          mkdir -p build/deploy/bin/imageformats
          cp /usr/lib/qt6/plugins/platforms/libqxcb.so build/deploy/bin/platforms/ 2>/dev/null || true
          cp /usr/lib/qt6/plugins/imageformats/*.so build/deploy/bin/imageformats/ 2>/dev/null || true

      - name: Create AppImage
        run: |
          # 下载 linuxdeployqt
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt
          # 构建 AppImage
          ./linuxdeployqt build/AppDir/usr/share/applications/serial-monitor.desktop \
            -appimage -qmake=/usr/bin/qmake6 \
            -extra-plugins=platforms,imageformats
          # 重命名
          mv EmberInterDebugTool*.AppImage build/EmberInterDebugTool-Linux.AppImage || true

          # 如果 AppImage 失败，打包 zip 作为后备
          if [ ! -f build/EmberInterDebugTool-Linux.AppImage ]; then
            cd build
            zip -r EmberInterDebugTool-Linux.zip deploy/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-package
          path: |
            build/EmberInterDebugTool-Linux.AppImage
            build/EmberInterDebugTool-Linux.zip

  # ═══════════════════════════════════════════════
  # 发布 Release
  # ═══════════════════════════════════════════════
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macOS-dmg/EmberInterDebugTool-macOS.dmg
            artifacts/Windows-zip/EmberInterDebugTool-Windows.zip
            artifacts/Linux-package/EmberInterDebugTool-Linux.AppImage
            artifacts/Linux-package/EmberInterDebugTool-Linux.zip
          generate_release_notes: true
          draft: false
          prerelease: false
